<!DOCTYPE html>
<html lang="gu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SBS Fairbook</title>
    <link rel="manifest" href="manifest.json">
    <style>
        :root {
            --bg-grad: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            --btn-grad: linear-gradient(to right, #00c6ff, #0072ff);
            --white: #ffffff;
        }
        body { 
            font-family: 'Segoe UI', sans-serif; 
            margin: 0; 
            background: #f0f2f5; 
            color: #333; 
        }

        /* Splash Screen */
        #splash {
            position: fixed; width: 100%; height: 100vh; background: white;
            display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 9999;
        }
        #splash img { width: 120px; border-radius: 20px; animation: pulse 1.5s infinite; }

        /* Colorful Header */
        header { 
            background: var(--bg-grad); 
            color: white; padding: 18px; 
            display: flex; align-items: center; justify-content: space-between; 
            position: sticky; top: 0; z-index: 100;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }
        .back-btn { font-size: 22px; cursor: pointer; display: none; }

        /* Page Background & Layout */
        .page { padding: 20px; min-height: 80vh; animation: fadeIn 0.4s; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .motivation { 
            text-align: center; padding: 15px; font-style: italic; 
            color: white; background: rgba(0,0,0,0.1); 
            margin-bottom: 25px; border-radius: 12px;
            border: 1px solid rgba(255,255,255,0.2);
            background-image: var(--bg-grad);
        }

        /* Column Buttons */
        .column-layout { display: flex; flex-direction: column; gap: 15px; }
        .btn { 
            background: var(--white); 
            padding: 20px;
            border-radius: 15px; 
            font-size: 1.2rem; 
            font-weight: bold; 
            cursor: pointer;
            transition: 0.3s; 
            text-align: center; 
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            border: none;
            color: #444;
        }
        .btn:active { transform: scale(0.98); background: #e0e0e0; }
        .std-btn { border-left: 8px solid #764ba2; }

        .hidden { display: none !important; }
        
        .subject-item { 
            background: white; padding: 18px; margin-bottom: 12px; 
            border-radius: 12px; border-left: 6px solid #00c6ff; 
            font-weight: bold; box-shadow: 0 2px 5px rgba(0,0,0,0.05);
        }
    </style>
</head>
<body>

    <div id="splash">
        <img src="icon.png" alt="Logo">
        <h2 style="color: #764ba2;">SBS Fairbook</h2>
    </div>

    <header>
        <div id="backBtn" class="back-btn" onclick="goBack()">⬅️</div>
        <div id="navTitle">SBS Fairbook</div>
        <div style="font-size: 24px;">☰</div>
    </header>

    <div id="homePage" class="page">
        <div class="motivation">"લક્ષ્ય સુધી પહોંચવા માટે શિક્ષણ એ શ્રેષ્ઠ રસ્તો છે."</div>
        <div class="column-layout">
            <div class="btn std-btn" onclick="showStreams(9)">Std. 9 (ધોરણ ૯)</div>
            <div class="btn std-btn" onclick="showStreams(10)">Std. 10 (ધોરણ ૧૦)</div>
            <div class="btn std-btn" onclick="showStreams(11)">Std. 11 (ધોરણ ૧૧)</div>
            <div class="btn std-btn" onclick="showStreams(12)">Std. 12 (ધોરણ ૧૨)</div>
        </div>
    </div>

    <div id="streamPage" class="page hidden">
        <h3 id="streamTitle" style="text-align: center;">સ્ટ્રીમ પસંદ કરો</h3>
        <div class="column-layout">
            <div class="btn" style="border-left-color: #ff4b2b;" onclick="showSubjects('Science')">Science (વિજ્ઞાન પ્રવાહ)</div>
            <div class="btn" style="border-left-color: #f9d423;" onclick="showSubjects('Commerce')">Commerce (સામાન્ય પ્રવાહ)</div>
            <div class="btn" style="border-left-color: #4facfe;" onclick="showSubjects('Arts')">Arts (વિનયન પ્રવાહ)</div>
        </div>
    </div>

    <div id="subjectPage" class="page hidden">
        <h3 id="subjectTitle" style="text-align: center;">વિષયો (NCERT મુજબ)</h3>
        <div id="subjectList" class="column-layout"></div>
    </div>

    <script>
        let history = ['homePage'];
        setTimeout(() => document.getElementById('splash').classList.add('hidden'), 2000);

        function navigate(toId, title) {
            document.querySelectorAll('.page').forEach(p => p.classList.add('hidden'));
            document.getElementById(toId).classList.remove('hidden');
            document.getElementById('navTitle').innerText = title;
            document.getElementById('backBtn').style.display = toId === 'homePage' ? 'none' : 'block';
            history.push(toId);
        }

        function goBack() {
            history.pop();
            let prev = history[history.length - 1];
            document.querySelectorAll('.page').forEach(p => p.classList.add('hidden'));
            document.getElementById(prev).classList.remove('hidden');
            if(prev === 'homePage') {
                document.getElementById('navTitle').innerText = 'SBS Fairbook';
                document.getElementById('backBtn').style.display = 'none';
                history = ['homePage'];
            }
        }

        function showStreams(std) {
            if(std >= 11) navigate('streamPage', 'Std. ' + std);
            else alert('Std. ' + std + ' ના વિષયો જલ્દી આવશે!');
        }

        function showSubjects(stream) {
            const list = document.getElementById('subjectList');
            list.innerHTML = ''; 
            let subs = [];
            
            if(stream === 'Science') subs = ['Physics (ભૌતિક વિજ્ઞાન)', 'Chemistry (રસાયણ વિજ્ઞાન)', 'Maths (ગણિત)', 'Biology (જીવ વિજ્ઞાન)', 'English (અંગ્રેજી)'];
            if(stream === 'Commerce') subs = ['Account (નામાના મૂળતત્વો)', 'Stat (આંકડાશાસ્ત્ર)', 'Eco (અર્થશાસ્ત્ર)', 'B.A. (વાણિજ્ય વ્યવસ્થા)', 'English (અંગ્રેજી)', 'Gujarati (ગુજરાતી)', 'S.P. & C.C.'];
            if(stream === 'Arts') subs = ['Psychology (મનોવિજ્ઞાન)', 'Sociology (સમાજશાસ્ત્ર)', 'Geography (ભૂગોળ)', 'History (ઇતિહાસ)', 'Sanskrit (સંસ્કૃત)', 'Political Science (રાજ્યશાસ્ત્ર)'];

            subs.forEach(s => {
                let div = document.createElement('div');
                div.className = 'subject-item';
                div.innerText = s;
                div.onclick = () => alert(s + ' મટીરીયલ અપલોડ થઈ રહ્યું છે...');
                list.appendChild(div);
            });
            navigate('subjectPage', stream);
        }
    </script>
</body>
</html>
